services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dullahan
      POSTGRES_USER: dullahan
      POSTGRES_PASSWORD: dullahan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  cal:
    build:
      context: .
    command: ["dullahan-cal"]
    environment:
      DULLAHAN_REPO_ROOT: /app
      CAL_HOST: 0.0.0.0
      CAL_PORT: "8100"
      WORLD_STATE_BACKEND: local
      WORLD_STATE_POSTGRES_DSN: postgresql://dullahan:dullahan@postgres:5432/dullahan
      DULLAHAN_INFERENCE_PROVIDER: ${DULLAHAN_INFERENCE_PROVIDER:-http}
      DULLAHAN_INFERENCE_BASE_URL: ${DULLAHAN_INFERENCE_BASE_URL:-}
      DULLAHAN_LOCAL_INFERENCE_BASE_URL: http://host.docker.internal:30000/v1
      DULLAHAN_INFERENCE_API_KEY: ${DULLAHAN_INFERENCE_API_KEY:-}
      DULLAHAN_TOKENIZER_BASE_URL: ${DULLAHAN_TOKENIZER_BASE_URL:-}
      DULLAHAN_TOKENIZER_API_KEY: ${DULLAHAN_TOKENIZER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    ports:
      - "8100:8100"
    volumes:
      - ./memory:/app/memory
      - ./configs:/app/configs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  edl:
    build:
      context: .
    command: ["dullahan-edl"]
    environment:
      DULLAHAN_REPO_ROOT: /app
      EDL_HOST: 0.0.0.0
      EDL_PORT: "8200"
      DULLAHAN_INFERENCE_PROVIDER: ${DULLAHAN_INFERENCE_PROVIDER:-http}
      DULLAHAN_INFERENCE_BASE_URL: ${DULLAHAN_INFERENCE_BASE_URL:-}
      DULLAHAN_LOCAL_INFERENCE_BASE_URL: http://host.docker.internal:30000/v1
      DULLAHAN_INFERENCE_API_KEY: ${DULLAHAN_INFERENCE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    ports:
      - "8200:8200"
    volumes:
      - ./memory:/app/memory
      - ./configs:/app/configs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent:
    build:
      context: .
    command:
      - dullahan-agent
      - How should CAL and EDL cooperate?
      - --transport
      - http
      - --cal-url
      - http://cal:8100
      - --edl-url
      - http://edl:8200
      - --max-depth
      - "1"
    environment:
      DULLAHAN_REPO_ROOT: /app
      DULLAHAN_INFERENCE_PROVIDER: ${DULLAHAN_INFERENCE_PROVIDER:-http}
      DULLAHAN_INFERENCE_BASE_URL: ${DULLAHAN_INFERENCE_BASE_URL:-}
      DULLAHAN_LOCAL_INFERENCE_BASE_URL: http://host.docker.internal:30000/v1
      DULLAHAN_INFERENCE_API_KEY: ${DULLAHAN_INFERENCE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    depends_on:
      - cal
      - edl
    profiles:
      - agent
    volumes:
      - ./memory:/app/memory
      - ./configs:/app/configs
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
