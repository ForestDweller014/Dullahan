name: send_to_CAL
description: Augment a subquery with parent-context and WorldStateDB retrieval.
input_schema:
  type: object
  required:
    - sender_id
    - subquery
    - parent_context
  properties:
    sender_id:
      type: string
    query_id:
      type: string
    subquery:
      type: string
      minLength: 1
    parent_context:
      type: object
output_schema:
  type: object
  required:
    - subquery
    - context
  properties:
    subquery:
      type: string
    context:
      type: object
